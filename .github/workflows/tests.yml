name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Linux, Windows, MacOS
  test-standard:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14', '3.14t']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: pip install sqlglotc sqlglot asyncpg

      - name: Start Server
        shell: bash
        run: python src/cudos.py

      - name: Run tests
        run: python tests/tests.py

  # Alpine Linux (Musl) 
  test-alpine:
    name: Test (Alpine/Musl)
    runs-on: ubuntu-latest
    container:
      image: python:3.13-alpine
    steps:
      - uses: actions/checkout@v6
      - name: Install Alpine build deps
        run: apk add --no-cache git patchelf
      - name: Install dependencies
        run: pip install sqlglotc sqlglot asyncpg
      
      - name: Start Server
        run: python src/cudos.py
      
      - name: Run tests
        run: python tests/tests.py

  # FreeBSD 
  test-freebsd:
    name: Test (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y python313 git
          run: |
            python3.13 -m venv venv
            . venv/bin/activate
            pip install sqlglotc sqlglot asyncpg
            python src/cudos.py
            python tests/tests.py
